<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Sản Phẩm</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-content {
      padding: 15px;
    }

    .product-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .product-price {
      color: red;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<header>
  Cửa Hàng Của Tôi
</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Sản phẩm">
    <div class="product-content">
      <div class="product-title">Sản phẩm 1</div>
      <div class="product-price">199.000đ</div>
      <a href="#" class="btn">Mua ngay</a>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Sản phẩm">
    <div class="product-content">
      <div class="product-title">Sản phẩm 2</div>
      <div class="product-price">299.000đ</div>
      <a href="#" class="btn">Mua ngay</a>
    </div>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Sản phẩm">
    <div class="product-content">
      <div class="product-title">Sản phẩm 3</div>
      <div class="product-price">399.000đ</div>
      <a href="#" class="btn">Mua ngay</a>
    </div>
  </div>

</div>

</body>
</html>
